apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bcg-hub-api
  namespace: bcg-hub
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: dev.radixal.net
      http:
        paths:
          - path: /bcg-hub/api
            pathType: Prefix
            backend:
              service:
                name: bcg-hub-api
                port:
                  number: 80
