apiVersion: apps/v1
kind: Deployment
metadata:
  name: bcg-hub-api
  namespace: bcg-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bcg-hub-api
  template:
    metadata:
      labels:
        app: bcg-hub-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: bcg-hub-api
          image: ghcr.io/radixal-sro/bcg-hub-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_PATHBASE
              value: "/bcg-hub"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            - name: AllowedHosts
              value: "dev.radixal.net"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: bcg-hub-secrets
                  key: DB
            - name: Cors__Origins__0
              value: "https://dev.radixal.net"
            - name: Cors__Origins__1
              value: "http://localhost:5173"
            - name: Cors__Origins__2
              value: "http://127.0.0.1:5173"
            - name: DataProtection__KeysPath
              value: "/var/bcg-hub/keys"
            - name: GoogleDrive__ClientId
              valueFrom:
                secretKeyRef:
                  name: bcg-hub-secrets
                  key: GoogleDriveClientId
            - name: GoogleDrive__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: bcg-hub-secrets
                  key: GoogleDriveClientSecret
            - name: GoogleDrive__RefreshToken
              valueFrom:
                secretKeyRef:
                  name: bcg-hub-secrets
                  key: GoogleDriveRefreshToken
            - name: GoogleDrive__RootFolderId
              valueFrom:
                secretKeyRef:
                  name: bcg-hub-secrets
                  key: GoogleDriveRootFolderId
            - name: MicrosoftGraph__TenantId
              value: "organizations"
            - name: MicrosoftGraph__ClientId
              valueFrom:
                secretKeyRef:
                  name: bcg-hub-secrets
                  key: MicrosoftGraphClientId
                  optional: true
            - name: MicrosoftGraph__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: bcg-hub-secrets
                  key: MicrosoftGraphClientSecret
                  optional: true
          volumeMounts:
            - name: data-protection-keys
              mountPath: /var/bcg-hub/keys
      volumes:
        - name: data-protection-keys
          persistentVolumeClaim:
            claimName: bcg-hub-data-protection-keys
